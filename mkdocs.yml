site_name: Novel Entity Matcher
site_description: Text-to-entity matching with SetFit few-shot learning, novelty detection, and discovery pipelines
site_url: https://minghao51.github.io/novel_entity_matcher/
repo_url: https://github.com/minghao51/novel_entity_matcher
repo_name: minghao51/novel_entity_matcher
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
      - Async API: async-guide.md
      - Examples: examples.md
      - Configuration: configuration.md
      - Models: models.md
      - Matcher Modes: matcher-modes.md
      - Static Embeddings: static-embeddings.md
      - Novel Class Detection: novel-class-detection.md
      - Troubleshooting: troubleshooting.md
  - API Reference:
      - Overview: api/index.md
      - Core: api/core.md
      - Novelty Detection: api/novelty.md
      - Novelty Strategies: api/novelty-strategies.md
      - Novelty Clustering: api/novelty-clustering.md
      - Novelty Storage: api/novelty-storage.md
      - Novelty Evaluation: api/novelty-evaluation.md
      - Novelty Proposals: api/novelty-proposal.md
      - Novelty Schemas: api/novelty-schemas.md
      - Pipeline: api/pipeline.md
      - Backends: api/backends.md
      - Benchmarks: api/benchmarks.md
      - Monitoring: api/monitoring.md
      - Extraction: api/extraction.md
      - Exceptions & Config: api/exceptions-config.md
  - Architecture:
      - Overview: architecture.md
      - Hierarchical Matching: architecture/hierarchical-matching.md
      - BERT Classifier: bert-classifier.md
      - Classifier Routes: classifier-routes-comparison.md
  - Experiments:
      - Overview: experiments/index.md
      - Benchmarking: experiments/benchmarking.md
      - Results: experiments/benchmark-results.md
  - Notebooks:
      - Overview: notebooks/index.md
      - Country Explorer: notebooks/01_country_matching_explorer.md
      - Novelty Dashboard: notebooks/02_novel_entity_dashboard.md
      - Training Impact: notebooks/03_training_impact_analyzer.md
      - Methodology: notebooks/04_methodology_benchmarks_overview.md
  - Project:
      - Testing Guide: testing.md
      - Contributing: CONTRIBUTING.md
      - Changelog: CHANGELOG.md
      - Benchmark Organization: benchmark-organization.md
  - Roadmap:
      - Technical Roadmap: technical-roadmap.md
      - Phase 2: phase2-roadmap.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_object_full_path: false
            show_category_heading: true
            show_submodules: true
            members_order: source
            heading_level: 2
            inherited_members: true
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true

watch:
  - src/novelentitymatcher

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

extra:
  version:
    provider: mike
