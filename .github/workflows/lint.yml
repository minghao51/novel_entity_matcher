name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - uses: pre-commit/action@v3.0.1

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Mypy type check
        run: uv run mypy src/novelentitymatcher

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Verify optional extras resolve
        run: uv sync --frozen --extra all

      - name: Build package
        run: uv run python -m build --sdist --wheel

      - name: Validate distributions
        run: uv run python -m twine check dist/*

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Scan dependencies for known vulnerabilities
        run: >
          uv run pip-audit
          --ignore-vuln CVE-2026-1839
          --ignore-vuln CVE-2026-3219
          --ignore-vuln GHSA-xqmj-j6mv-4862
