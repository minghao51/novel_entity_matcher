name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Verify optional extras resolve
        run: uv sync --frozen --extra all

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy src/novelentitymatcher

      - name: Build package
        run: uv run python -m build --sdist --wheel

      - name: Validate distributions
        run: uv run python -m twine check dist/*

      - name: Scan dependencies for known vulnerabilities
        # Temporary risk acceptance (patch-only batch, revisit by 2026-06-30):
        # - CVE-2026-1839: requires transformers 5.x (major upgrade).
        # - CVE-2026-3219: pip toolchain advisory outside runtime library surface.
        # - GHSA-xqmj-j6mv-4862: litellm is pinned to >=1.83.7, but pip-audit
        #   can still report stale metadata in some environments.
        run: uv run pip-audit --ignore-vuln CVE-2026-1839 --ignore-vuln CVE-2026-3219 --ignore-vuln GHSA-xqmj-j6mv-4862
