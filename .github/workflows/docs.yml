name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "notebooks/**"
      - "src/**"
      - "mkdocs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "notebooks/**"
      - "src/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check for changed notebooks
        id: check_notebooks
        run: |
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "changed=notebooks/*.py" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only HEAD~1 HEAD -- notebooks/*.py)
          if [ -n "$changed" ]; then
            echo "changed<<EOF" >> "$GITHUB_OUTPUT"
            echo "$changed" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "changed=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate MkDocs pages from notebooks (fast, no execution)
        run: |
          for f in notebooks/*.py; do
            name=$(basename "$f" .py)
            uv run marimo export md "$f" -o "docs/notebooks/${name}.md" -f
          done

      - name: Export changed notebooks as static HTML (slow, runs ML models)
        if: steps.check_notebooks.outputs.changed != ''
        run: |
          echo "${{ steps.check_notebooks.outputs.changed }}" > /tmp/changed_notebooks.txt
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            name=$(basename "$f" .py)
            uv run marimo export html "$f" -o "docs/notebooks/${name}.html" -f
          done < /tmp/changed_notebooks.txt

      - name: Build site
        run: uv run mkdocs build

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
