name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "notebooks/**"
      - "src/**"
      - "mkdocs.yml"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "notebooks/**"
      - "src/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - uses: quarto-dev/quarto-action/setup@v2

      - name: Install dependencies
        run: uv sync --extra docs

      - name: Render notebooks with Quarto
        run: uv run quarto render notebooks/  # reads _freeze/ cache, skips re-execution on unchanged

      - name: Generate MkDocs stub pages
        run: uv run python scripts/generate_notebook_docs.py

      - name: Build site
        run: uv run mkdocs build

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
